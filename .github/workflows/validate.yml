name: Validate definition.json files

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Validate definition.json files
        run: deno run --allow-read --allow-net .validation/validate_definitions.ts
